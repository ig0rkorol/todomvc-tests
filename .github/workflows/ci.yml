name: UI Tests — TodoMVC

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:
    inputs:
      parallel_forks:
        description: 'Number of parallel browser forks'
        required: false
        default: '4'
      headless:
        description: 'Run headless'
        required: false
        default: 'true'

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: '-Xmx2048m'

jobs:
  test:
    name: Run Selenide Tests (parallel)
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Install Google Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Verify Chrome version
        run: google-chrome --version

      - name: Run tests in parallel
        run: |
          mvn clean test \
            -Dheadless=${{ github.event.inputs.headless || 'true' }} \
            -Dbrowser=chrome \
            -Dparallel.forks=${{ github.event.inputs.parallel_forks || '4' }} \
            -Dapp.url=https://todomvc.com/examples/react/dist/ \
            --no-transfer-progress
        continue-on-error: true

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: target/allure-results/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload test logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-logs
          path: target/logs/
          retention-days: 7
          if-no-files-found: warn

      - name: Upload surefire reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7
          if-no-files-found: warn

      - name: Install Allure CLI
        if: always()
        run: |
          curl -o allure.tgz -L https://github.com/allure-framework/allure2/releases/download/2.29.0/allure-2.29.0.tgz
          tar -zxvf allure.tgz
          sudo mv allure-2.29.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure
          allure --version

      - name: Generate Allure report
        if: always()
        run: allure generate target/allure-results --clean -o target/allure-report

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always() && github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: target/allure-report

      - name: Fail build if tests failed
        run: |
          if [ -f target/surefire-reports/*.txt ]; then
            grep -q "FAILURE\|ERROR" target/surefire-reports/*.txt && exit 1 || exit 0
          fi